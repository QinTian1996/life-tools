<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>命理浅析</title>
<style>
@page {
  size: A4;
  margin: 2cm 2.5cm;
}
body {
  font-family: 'KaiTi', 'STKaiti', '楷体', serif;
  font-size: 11.5pt;
  line-height: 2;
  color: #1a1a1a;
}
h1 {
  font-size: 26pt;
  text-align: center;
  margin: 0.5cm 0 0.8cm;
  font-weight: 400;
  letter-spacing: 6px;
  color: #8B0000;
}
h2 {
  font-size: 15pt;
  margin: 0.7cm 0 0.3cm;
  padding: 4px 0 4px 10px;
  border-left: 4px solid #8B0000;
  color: #222;
}
h3 {
  font-size: 13pt;
  margin: 0.4cm 0 0.2cm;
  color: #333;
}
p {
  margin: 0 0 0.6em 0;
  text-indent: 0;
}
blockquote {
  border-left: 3px solid #ddd;
  margin: 14px 18px;
  padding: 6px 16px;
  background: #f9f9f9;
  color: #555;
  font-size: 10.5pt;
}
blockquote p { text-indent: 0; }
table {
  border-collapse: collapse;
  width: 100%;
  margin: 10px 0;
  font-size: 10.5pt;
}
th {
  background: #f5f5f5;
  font-weight: 700;
  padding: 5px 8px;
  border: 1px solid #aaa;
  text-align: center;
}
td {
  padding: 4px 8px;
  border: 1px solid #aaa;
}
ul, ol {
  padding-left: 2.5em;
  margin: 5px 0;
}
li {
  margin: 3px 0;
}
strong {
  color: #8B0000;
}
hr {
  margin: 0.5cm 0;
  border: none;
  border-top: 1px solid #ddd;
}
hr + p {
  text-align: center;
}
.signature {
  text-align: right;
  margin-top: 1cm;
  font-size: 11pt;
  color: #555;
}
.footer {
  text-align: center;
  color: #ccc;
  font-size: 9pt;
  margin-top: 0.4cm;
}
</style>
</head>
<body>

$body$

<div class="signature">—— 喵十七</div>
<div class="footer">仅供了解命理文化参考</div>

</body>
</html>
