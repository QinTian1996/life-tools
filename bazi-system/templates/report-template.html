<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>命理分析报告</title>
<style>
@page {
  size: A4;
  margin: 2cm 2.5cm;
  @top-left { content: none; }
  @top-right { content: none; }
  @bottom-left { content: none; }
  @bottom-right { content: none; }
}
body {
  font-family: 'WenQuanYi Zen Hei', 'Noto Sans CJK SC', 'Source Han Sans SC', 'Droid Sans Fallback', serif;
  font-size: 11pt;
  line-height: 1.9;
  color: #1a1a1a;
}
h1 {
  font-family: 'KaiTi', 'STKaiti', '楷体', serif;
  font-size: 26pt;
  text-align: center;
  margin: 0.8cm 0 1cm;
  font-weight: 400;
  letter-spacing: 6px;
  color: #8B0000;
}
h2 {
  font-size: 15pt;
  margin: 0.8cm 0 0.4cm;
  padding: 6px 0 6px 12px;
  border-left: 4px solid #8B0000;
  color: #222;
  background: #fafafa;
}
h3 {
  font-size: 12.5pt;
  margin: 0.5cm 0 0.3cm;
  color: #333;
}
p {
  margin: 6px 0;
  text-indent: 2em;
}
blockquote {
  border-left: 3px solid #ccc;
  margin: 16px 20px;
  padding: 8px 18px;
  background: #f9f9f9;
  color: #555;
  font-size: 10.5pt;
}
blockquote p { text-indent: 0; }
table {
  border-collapse: collapse;
  width: 100%;
  margin: 12px 0;
  font-size: 10.5pt;
}
th {
  background: #f0f0f0;
  font-weight: 700;
  padding: 6px 10px;
  border: 1px solid #999;
  text-align: center;
}
td {
  padding: 5px 10px;
  border: 1px solid #999;
}
ul, ol {
  padding-left: 2.5em;
  margin: 6px 0;
}
li { margin: 4px 0; }
strong { color: #8B0000; font-weight: 700; }
hr { margin: 0.6cm 0; border: none; border-top: 1px solid #ddd; }
.signature {
  text-align: right;
  margin-top: 1.2cm;
  font-size: 11pt;
  color: #555;
}
.footer {
  text-align: center;
  color: #bbb;
  font-size: 9pt;
  margin-top: 0.5cm;
}
</style>
</head>
<body>
$body$
<div class="signature">—— 喵十七</div>
<div class="footer">以上内容仅供了解命理文化参考</div>
</body>
</html>
